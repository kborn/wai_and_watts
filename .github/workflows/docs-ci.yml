name: Docs CI

on:
  pull_request:
    paths:
      - 'README.md'
      - 'docs/**'
      - 'engineering/**'
      - 'scripts/ci/check-docs.sh'
      - '.github/workflows/docs-ci.yml'
  push:
    branches: [ main ]

concurrency:
  group: docs-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate canonical docs
        run: ./scripts/ci/check-docs.sh
