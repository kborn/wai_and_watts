name: Backend CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate canonical docs
        run: ./scripts/ci/check-docs.sh

  contract-suite:
    runs-on: ubuntu-latest
    needs: docs-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: 'maven'

      - name: Run backend contract smoke suite
        run: >
          mvn -f backend -B
          -Dtest=AskEndpointContractIntegrationTest,ExplanationControllerRefusalIntegrationTest,NaturalLanguageEndpointIntegrationTest,OpenAiIntentParserTest,ExplanationServiceImplEdgeCaseTest,CitationMapperTest
          test

  build-test:
    runs-on: ubuntu-latest
    needs: [docs-check, contract-suite]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: 'maven'

      - name: Build and test (backend)
        run: mvn -f backend -B clean verify

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-jacoco-report
          path: backend/target/site/jacoco/
          if-no-files-found: warn
