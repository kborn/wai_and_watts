name: Backend CI

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'backend/pom.xml'
      - 'pom.xml'
      - '.github/workflows/backend-ci.yml'
  push:
    branches: [ main ]

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract-suite:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: 'maven'

      - name: Run backend contract smoke suite
        run: mvn -f backend -B -Dgroups=contract test

  build-test:
    runs-on: ubuntu-latest
    needs: contract-suite
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: 'maven'

      - name: Build and test (backend)
        run: mvn -f backend -B verify

      - name: Report /ask p95 latency trend (non-blocking)
        continue-on-error: true
        run: mvn -f backend -B -Dtest=AskLatencyTrendContractTest test

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-jacoco-report
          path: backend/target/site/jacoco/
          if-no-files-found: warn
