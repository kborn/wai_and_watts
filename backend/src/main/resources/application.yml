spring:
  application:
    name: wai-and-watts
  profiles:
    active: dev
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/waiwatts}
    username: ${DB_USER:waiwatts}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true

waiwatts:
  llm:
    provider: ${LLM_PROVIDER:}
    model: ${LLM_MODEL:}
    api-key: ${LLM_API_KEY:}
    base-url: ${LLM_BASE_URL:}
    timeout-seconds: ${LLM_TIMEOUT_SECONDS:30}
    temperature: ${LLM_TEMPERATURE:0.2}
    max-output-tokens: ${LLM_MAX_OUTPUT_TOKENS:500}
  lawa:
    state-category-bands:
      EXCELLENT: [ "A" ]
      GOOD: [ "B" ]
      FAIR: [ "C" ]
      POOR: [ "D", "E" ]
    regional-sample:
      top-k: 2
      bottom-k: 2
